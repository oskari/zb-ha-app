name: "ZerryBit Engine"
version: "0.1.3.dev1"
slug: "zb_engine"
description: "Renders 1-bit e-ink dashboards from a JSON payload. Visual widget builder"
arch:
  - aarch64
  - amd64
init: false
startup: application
homeassistant_api: true
# Grants read-only access to the Supervisor API (default role). Used solely by
# GET /api/host-ip to read /network/info and show the host's LAN IP for ESP32
# device URLs. The default role only permits the read-only /info endpoints —
# no network/add-on write access.
hassio_api: true
# A hardening AppArmor profile ships alongside this file as `apparmor.txt`
# (profile name `zb_engine`). The Supervisor loads it automatically; it drops
# all capabilities except those the entrypoint needs and blocks mount/ptrace/
# raw sockets. Set `apparmor: false` to opt out (not recommended).
ingress: true
ingress_port: 8099
panel_title: "ZerryBit Engine"
panel_icon: "mdi:card-text-outline"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "ESP32 image endpoint (unauthenticated, read-only). Change this host port if 8000 is already in use."
options:
  # Outbound egress allowlist for source / image / SVG fetches.
  # Empty list = ALL public domains are allowed (private/reserved IP ranges
  # are always blocked regardless). Add hostnames (e.g. "api.example.com")
  # to restrict egress; subdomains of a listed host are also allowed.
  allowed_source_domains: []
  re_render_minutes: 0
  image_port_cooldown_ms: 4000
  image_port_mode: "on-demand"
schema:
  allowed_source_domains: [str]
  re_render_minutes: "int(0,60)"
  image_port_cooldown_ms: "int(1000,60000)"
  image_port_mode: "list(on-demand|cache-only)"
